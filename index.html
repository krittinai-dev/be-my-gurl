<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ถึง pluem 💕</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div id="hearts-container"></div>

  <!-- Music Bottom Sheet -->
  <div id="music-overlay" class="music-overlay"></div>
  <div id="music-sheet" class="music-sheet">
    <div class="music-sheet-handle"></div>
    <div class="music-sheet-header">
      <div>
        <p class="music-label">🎵 เพลงประกอบ</p>
        <p class="music-title">กดเล่นได้เลย</p>
      </div>
      <button id="music-close" class="music-close">✕</button>
    </div>
    <div class="music-embed-wrap">
      <iframe id="yt-player"
        src="https://www.youtube.com/embed/ytVyf_82lC0?loop=1&playlist=ytVyf_82lC0&rel=0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen
        frameborder="0">
      </iframe>
    </div>
  </div>
  <button id="music-toggle" title="เปิดเพลง">🎵</button>

  <!-- Page 1: Intro -->
  <section id="page-intro" class="page active">
    <div class="intro-wrap">
    <div class="site-badge">💌 from Palm</div>
    <h1 class="site-title">be my<br/><span>gurl</span></h1>
    <div class="card">
      <img src="assets/roses-guy.jpeg" alt="ผมมีดอกไม้ให้" class="meme-roses" />
      <p class="intro-label">จาก Palm ถึง</p>
      <h1 id="intro-text" class="typewriter"></h1>
      <p class="intro-sub">พี่มีเรื่องอยากบอก...</p>
      <button class="btn-primary" id="btn-next-intro">ต่อไป</button>
    </div>
    </div>
  </section>

  <!-- Page 2: Love Letter -->
  <section id="page-reasons" class="page page-letter">
    <div class="letter-center-wrap">
      <div class="letter-envelope" id="letter-envelope">
        <div class="envelope-flap"></div>
        <div class="envelope-body">
          <div class="envelope-heart">💌</div>
        </div>
      </div>
    </div>
    <div class="letter-sheet" id="letter-sheet">
      <div class="letter-inner">
        <div class="letter-corner-deco">🌸✨🌸</div>
        <img src="assets/shy-boy.jpeg" alt="อายจัง" class="meme-letter" />
        <div class="letter-lines" id="letter-lines"></div>
        <div class="letter-sig">รัก,<br/><span class="sig-name">ปาล์มสุดหล่อ 💕</span></div>
        <div class="wax-seal">💌</div>
        <button class="btn-primary" id="btn-next-reasons">ต่อไป</button>
      </div>
    </div>
  </section>

  <!-- Page 3: The Question -->
  <section id="page-question" class="page">
    <div class="card question-card">
      <h1 class="question-text">เป็นแฟนกันไหม<br/>pluem? 💕</h1>
      <div class="btn-group">
        <button class="btn-yes" id="btn-yes">ตกลง 💕</button>
        <button class="btn-no" id="btn-no">ไม่</button>
      </div>
      <p class="hint" id="no-hint"></p>
    </div>
    <img src="assets/scream-guy.jpeg" alt="กรีดร้อง" class="meme-scream" id="meme-scream" />
  </section>

  <!-- Page 4: Celebration -->
  <section id="page-celebrate" class="page">
    <div id="confetti-container"></div>
    <div class="card celebrate-card">
      <div class="celebrate-video-wrap">
        <video id="celebrate-video" src="assets/video.mp4"
          autoplay muted loop playsinline
          class="celebrate-video">
        </video>
        <button id="video-sound-btn" class="video-sound-btn" title="เปิด/ปิดเสียง">🔇</button>
      </div>
      <h1 class="celebrate-title">เป็นแฟนกัน<br/>แล้วนะ</h1>
      <div class="date-box" id="start-date"></div>
      <button class="btn-primary" id="btn-restart">เริ่มใหม่</button>
    </div>
  </section>

  <script src="scripts/main.js"></script>
</body>
</html>
