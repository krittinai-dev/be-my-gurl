<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ปลื้ม — จะเป็นแฟนผมไหม? 💕</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div id="hearts-container"></div>

  <!-- Page 1: Intro -->
  <section id="page-intro" class="page active">
    <div class="card">
      <img src="assets/roses-guy.jpeg" alt="ผมมีดอกไม้ให้" class="meme-img meme-roses" />
      <h1 class="typewriter" id="intro-text"></h1>
      <button class="btn-primary" id="btn-next-intro">ต่อไป →</button>
    </div>
  </section>

  <!-- Page 2: Love Letter -->
  <section id="page-reasons" class="page">
    <div class="letter-envelope" id="letter-envelope">
      <div class="envelope-flap"></div>
      <div class="envelope-body">
        <div class="envelope-heart">💌</div>
      </div>
    </div>
    <div class="letter-sheet" id="letter-sheet">
      <div class="letter-inner">
        <img src="assets/shy-boy.jpeg" alt="อายจัง" class="meme-img meme-shy meme-letter" />
        <div class="letter-lines" id="letter-lines"></div>
        <div class="letter-sig">ด้วยรัก,<br/><span class="sig-name">คนที่แอบชอบปลื้ม 💕</span></div>
        <button class="btn-primary" id="btn-next-reasons">ต่อไป →</button>
      </div>
    </div>
  </section>

  <!-- Page 3: The Question -->
  <section id="page-question" class="page">
    <div class="card question-card">
      <div class="emoji-big">🌹</div>
      <h1 class="question-text">ปลื้ม<br/>จะเป็นแฟนผมไหม?</h1>
      <div class="btn-group">
        <button class="btn-yes" id="btn-yes">ใช่!! 💕</button>
        <button class="btn-no" id="btn-no">ไม่ใช่</button>
      </div>
      <p class="hint" id="no-hint"></p>
    </div>
    <!-- Scream meme — ปรากฏเมื่อ No วิ่งหนี -->
    <img src="assets/scream-guy.jpeg" alt="กรีดร้อง" class="meme-img meme-scream" id="meme-scream" />
  </section>

  <!-- Page 4: Celebration -->
  <section id="page-celebrate" class="page">
    <div id="confetti-container"></div>
    <img src="assets/love-explosion.jpeg" alt="love explosion" class="meme-bg-celebrate" />
    <div class="card celebrate-card">
      <div class="emoji-big celebrate-emoji">🎉</div>
      <h1>ยินดีด้วย!! 🎊</h1>
      <p class="celebrate-text">เราเป็นแฟนกันแล้วนะ ปลื้ม 💑</p>
      <p class="celebrate-sub">วันนี้คือจุดเริ่มต้นของเรา</p>
      <div class="date-box" id="start-date"></div>
      <button class="btn-primary" id="btn-restart">เริ่มใหม่ 🔄</button>
    </div>
  </section>

  <script src="scripts/main.js"></script>
</body>
</html>
