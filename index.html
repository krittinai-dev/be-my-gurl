<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ถึง pluem 💕</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div id="hearts-container"></div>

  <!-- YouTube Music Player (hidden) -->
  <div id="yt-player-wrap">
    <iframe id="yt-player"
      src="https://www.youtube.com/embed/ytVyf_82lC0?enablejsapi=1&autoplay=0&loop=1&playlist=ytVyf_82lC0&controls=0&mute=0"
      allow="autoplay; encrypted-media"
      frameborder="0">
    </iframe>
  </div>
  <button id="music-toggle" title="เปิด/ปิดเพลง">🎵</button>

  <!-- Page 1: Intro -->
  <section id="page-intro" class="page active">
    <div class="card">
      <img src="assets/roses-guy.jpeg" alt="ผมมีดอกไม้ให้" class="meme-roses" />
      <p class="intro-label">จาก ปาล์ม ถึง</p>
      <h1 id="intro-text" class="typewriter"></h1>
      <p class="intro-sub">พี่มีเรื่องอยากบอก...</p>
      <button class="btn-primary" id="btn-next-intro">ต่อไป</button>
    </div>
  </section>

  <!-- Page 2: Love Letter -->
  <section id="page-reasons" class="page">
    <div class="letter-envelope" id="letter-envelope">
      <div class="envelope-flap"></div>
      <div class="envelope-body">
        <div class="envelope-heart">💌</div>
      </div>
    </div>
    <div class="letter-sheet" id="letter-sheet">
      <div class="letter-inner">
        <img src="assets/shy-boy.jpeg" alt="อายจัง" class="meme-letter" />
        <div class="letter-lines" id="letter-lines"></div>
        <div class="letter-sig">รัก,<br/><span class="sig-name">ปาล์มสุดหล่อ 💕</span></div>
        <button class="btn-primary" id="btn-next-reasons">ต่อไป</button>
      </div>
    </div>
  </section>

  <!-- Page 3: The Question -->
  <section id="page-question" class="page">
    <div class="card question-card">
      <p class="question-context">หนูเคยบอกว่าอยากเป็นแฟนกัน<br/>แต่ยังไม่พร้อม...</p>
      <h1 class="question-text">เป็นแฟนกันไหม<br/>pluem? 💕</h1>
      <div class="btn-group">
        <button class="btn-yes" id="btn-yes">ตกลง 💕</button>
        <button class="btn-no" id="btn-no">ไม่</button>
      </div>
      <p class="hint" id="no-hint"></p>
    </div>
    <img src="assets/scream-guy.jpeg" alt="กรีดร้อง" class="meme-scream" id="meme-scream" />
  </section>

  <!-- Page 4: Celebration -->
  <section id="page-celebrate" class="page">
    <div id="confetti-container"></div>
    <div class="card celebrate-card">
      <div class="celebrate-meme-ring">
        <img src="assets/love-explosion.jpeg" alt="love" class="celebrate-meme-img" />
      </div>
      <h1 class="celebrate-title">เป็นแฟนกัน<br/>แล้วนะ</h1>
      <div class="date-box" id="start-date"></div>
      <button class="btn-primary" id="btn-restart">เริ่มใหม่</button>
    </div>
  </section>

  <script src="scripts/main.js"></script>
</body>
</html>
